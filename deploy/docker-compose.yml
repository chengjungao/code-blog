services:
  code-blog:
    image: ${ACR_REGISTRY}/${ACR_NAMESPACE}/code-blog:latest
    container_name: code-blog
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - TZ=Asia/Shanghai
      - SPRING_DATASOURCE_URL=${DB_URL:-jdbc:mysql://host.docker.internal:3306/my_blog_db?useUnicode=true&characterEncoding=utf8&autoReconnect=true&useSSL=false&serverTimezone=UTC}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-root}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS:-your_password}
      - FILE_ATTACHMENT=/var/blog/data/
    volumes:
      # 数据持久化（上传文件等）
      - /var/blog/data:/var/blog/data
      # Solr 索引数据
      - /var/blog/solr:/var/blog/solr
      # SSL 证书：宿主机 /etc/ssl/nginx/ → 容器内同路径（只读）
      - /etc/ssl/nginx:/etc/ssl/nginx:ro
