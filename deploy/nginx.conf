# ========== HTTPS 主服务 ==========
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/ssl/nginx/chengjungao.cn.pem;
    ssl_certificate_key /etc/ssl/nginx/chengjungao.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # ========== API Proxy ==========

    # Blog API (BlogApiController)
    location /blog/api/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin API (AdminApiController)
    location /admin/api/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin CRUD APIs (original controllers)
    location ~ ^/admin/(blogs|categories|tags|comments|links|configurations|upload)/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 5M;
    }

    # Common endpoints (captcha etc.)
    location /common/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Upload files (served by backend)
    location /upload/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========== Admin Frontend SPA ==========
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    location = /admin {
        return 301 /admin/;
    }

    # ========== Blog Frontend SPA ==========
    location / {
        root /usr/share/nginx/html/blog;
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}

# ========== HTTP → HTTPS 重定向 ==========
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}
