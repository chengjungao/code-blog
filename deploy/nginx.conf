# ========== HTTP → HTTPS 重定向 ==========
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# ========== HTTPS 主服务 ==========
server {
    listen 443 ssl default_server;
    server_name _;

    # SSL 证书（宿主机挂载到容器 /etc/ssl/nginx/）
    ssl_certificate     /etc/ssl/nginx/chengjungao.cn.pem;
    ssl_certificate_key /etc/ssl/nginx/chengjungao.cn.key;

    # SSL 安全配置
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS（可选，首次部署建议先注释掉，确认 HTTPS 正常后再开启）
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # ========== API Proxy (matched first) ==========

    # Blog API (BlogApiController)
    location /blog/api/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin API (AdminApiController)
    location /admin/api/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin CRUD APIs (original controllers)
    location ~ ^/admin/(blogs|categories|tags|comments|links|configurations|upload)/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File upload size limit
        client_max_body_size 5M;
    }

    # Common endpoints (captcha etc.)
    location /common/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend static resources
    location /blog/default/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
    }

    # ========== Admin Frontend SPA ==========
    location /admin {
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /admin/index.html;

        location ~* /admin/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /usr/share/nginx/html/admin;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========== Blog Frontend SPA ==========
    location / {
        root /usr/share/nginx/html/blog;
        try_files $uri $uri/ /index.html;

        location ~* /assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
