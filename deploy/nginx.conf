server {
    listen 80 default_server;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # ========== API Proxy (matched first) ==========

    # Blog API (BlogApiController)
    location /blog/api/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin API (AdminApiController)
    location /admin/api/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin CRUD APIs (original controllers)
    location ~ ^/admin/(blogs|categories|tags|comments|links|configurations|upload)/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File upload size limit (match Spring Boot config)
        client_max_body_size 5M;
    }

    # Common endpoints (captcha etc.)
    location /common/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend static resources (blog themes, uploaded files)
    location /blog/default/ {
        proxy_pass http://127.0.0.1:28083;
        proxy_set_header Host $host;
    }

    # ========== Admin Frontend SPA ==========
    location /admin {
        alias /usr/share/nginx/html/admin;
        try_files $uri $uri/ /admin/index.html;

        # Cache static assets aggressively
        location ~* /admin/assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            alias /usr/share/nginx/html/admin;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ========== Blog Frontend SPA ==========
    location / {
        root /usr/share/nginx/html/blog;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* /assets/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
