[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:java]
command=java -jar -Xmx256m -Xms128m app.jar --spring.profiles.active=prd,local
directory=/opt/app/blog
autostart=true
autorestart=true
startretries=10
startsecs=30
stdout_logfile=/var/log/supervisor/java.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=3
stderr_logfile=/var/log/supervisor/java-error.log
stderr_logfile_maxbytes=10MB
stderr_logfile_backups=3
environment=JAVA_OPTS="-Xmx256m -Xms128m",HOME="/root"

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/var/log/supervisor/nginx.log
stdout_logfile_maxbytes=5MB
stdout_logfile_backups=2
stderr_logfile=/var/log/supervisor/nginx-error.log
stderr_logfile_maxbytes=5MB
stderr_logfile_backups=2
